<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sine Line Image Converter</title>
    <link rel="icon" type="image/svg+xml" href="ファビコン.svg">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="変換結果">
        <canvas id="outputCanvas" width="900" height="1100"></canvas>
        <canvas id="sourceCanvas" hidden></canvas>
        <label class="upload-box">
          <input id="imageInput" type="file" accept="image/*">
          <span>画像をアップロード</span>
        </label>
      </section>

      <aside class="control-panel" aria-label="設定">
        <div class="panel-heading">
          <p class="eyebrow">Sine Line Converter</p>
        </div>

        <div class="color-grid">
          <label class="field">
            <span>線の色</span>
            <input id="lineColor" type="color" value="#ff6848">
          </label>
          <label class="field">
            <span>背景色</span>
            <input id="backgroundColor" type="color" value="#fffdf8">
          </label>
        </div>

        <label class="field">
          <span class="field-head">
            <span class="field-name">線の間隔</span>
            <span class="value-group"><input id="lineSpacingNumber" class="number-input" type="number" inputmode="decimal" min="2" max="20" step="1" value="9"> px</span>
          </span>
          <div class="control-row">
            <input id="lineSpacing" type="range" min="2" max="20" step="1" value="3">
          </div>
        </label>

        <label class="field">
          <span class="field-head">
            <span class="field-name">線の太さ</span>
            <span class="value-group"><input id="lineWidthNumber" class="number-input" type="number" inputmode="decimal" min="0.2" max="8" step="0.1" value="0.5"> px</span>
          </span>
          <div class="control-row">
            <input id="lineWidth" type="range" min="0.2" max="8" step="0.1" value="0.5">
          </div>
        </label>

        <div class="field range-field">
          <span class="field-head">
            <span class="field-name">波の大きさ</span>
            <span class="value-group">
              <input id="minAmplitudeNumber" class="number-input" type="number" inputmode="decimal" min="0" max="42" step="0.1" value="0"> px
              <span class="range-separator">-</span>
              <input id="maxAmplitudeNumber" class="number-input" type="number" inputmode="decimal" min="0" max="42" step="0.5" value="13"> px
            </span>
          </span>
          <div class="dual-range" id="amplitudeRange">
            <input id="minAmplitude" type="range" min="0" max="42" step="0.1" value="0" aria-label="最小振幅">
            <input id="maxAmplitude" type="range" min="0" max="42" step="0.5" value="13" aria-label="最大振幅">
          </div>
        </div>

        <div class="field range-field">
          <span class="field-head">
            <span class="field-name">波の細かさ</span>
            <span class="value-group">
              <input id="minFrequencyNumber" class="number-input" type="number" inputmode="decimal" min="0.001" max="1" step="0.001" value="0.001">
              <span class="range-separator">-</span>
              <input id="maxFrequencyNumber" class="number-input" type="number" inputmode="decimal" min="0.001" max="1" step="0.001" value="0.400">
            </span>
          </span>
          <div class="dual-range" id="frequencyRange">
            <input id="minFrequency" type="range" min="0.001" max="1" step="0.001" value="0.001" aria-label="最小周波数">
            <input id="maxFrequency" type="range" min="0.001" max="1" step="0.001" value="0.400" aria-label="最大周波数">
          </div>
        </div>

        <label class="field">
          <span class="field-head">
            <span class="field-name">影の強調</span>
            <span class="value-group"><input id="darkAlphaNumber" class="number-input" type="number" inputmode="decimal" min="0" max="1" step="0.01" value="0.15"></span>
          </span>
          <div class="control-row">
            <input id="darkAlpha" type="range" min="0" max="1" step="0.01" value="0.15">
          </div>
        </label>

        <label class="field">
          <span class="field-head">
            <span class="field-name">コントラスト</span>
            <span class="value-group"><input id="gammaNumber" class="number-input" type="number" inputmode="decimal" min="0" max="1" step="0.01" value="0.6"></span>
          </span>
          <div class="control-row">
            <input id="gamma" type="range" min="0" max="1" step="0.01" value="0.6">
          </div>
        </label>

        <div class="button-row">
          <button id="downloadButton" type="button">PNG保存</button>
          <button id="saveSvgButton" type="button">SVG保存</button>
          <button id="copySvgButton" type="button">SVGコピー</button>
          <button id="replaceImageButton" class="button-secondary" type="button" hidden>別の画像をアップロード</button>
        </div>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
